server:
  port: 8080

spring:
  application:
    name: chiller-guard
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/structra}
    username: ${SPRING_DATASOURCE_USERNAME:structra}
    password: ${SPRING_DATASOURCE_PASSWORD:structra_dev_change_me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
