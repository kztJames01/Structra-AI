server:
  port: 8080
  # TLS can be enabled by setting these env vars in production.
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    enabled-protocols: TLSv1.3
    ciphers: TLS_AES_128_GCM_SHA256,TLS_AES_256_GCM_SHA384

spring:
  application:
    name: chiller-guard
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/structra}
    username: ${SPRING_DATASOURCE_USERNAME:structra}
    password: ${SPRING_DATASOURCE_PASSWORD:structra_dev_change_me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  # Async configuration
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 500
      thread-name-prefix: "async-"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
    jwt-secret: ${APP_SECURITY_JWT_SECRET:change-me-dev-only-change-me-dev-only}
    jwt-ttl-seconds: ${APP_SECURITY_JWT_TTL_SECONDS:3600}
    # In production, this should come from Azure Key Vault or Kubernetes secrets.
    encryption-key: ${APP_SECURITY_ENCRYPTION_KEY:dev-32-byte-key-change-me-123456}
